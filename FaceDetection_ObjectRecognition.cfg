// Face Detection → Object Recognition pipeline
// Source → Rotate → FaceDetect → FaceFilter → ObjectRecognize → XML

[Session]
Engine0 = Source
Engine1 = Rotate
Engine2 = FaceDetect
Engine3 = FaceFilter
Engine4 = ObjectRecognize
Engine5 = XML
Import0 = DrawCrop

[Source]
Type = image

[Rotate]
Type = rotate
Input = Default_Image

[FaceDetect]
Type = facedetect
Input = Rotate.Output
Orientation = Any
DetectionThreshold = 30
MinSize = 24px
NumParallel = 4
SegmentDuration = 1s

[FaceFilter]
Type = filter
Input = FaceDetect.ResultWithSource
LuaScript = faceFilter.lua

[ObjectRecognize]
Type = ObjectRecognition
Input = FaceFilter.Output

[XML]
Type = xml
Input = FaceDetect.Result, ObjectRecognize.Result
OutputPath = output/%session.token%/face_object.xml
OutputInterval = 1s

[DrawCrop]
Config = examples/Library/Other/DrawCrop.cfg
Input = ResultWithSource:FaceDetect.ResultWithSource
Parameter0 = Border:50%
Parameter1 = FileName:face_object/%record.id%_%record.gender%
